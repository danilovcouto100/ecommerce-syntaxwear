<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyntaxWear - Tênis e Sneakers Online</title>
  <meta name="description"
    content="Descubra a coleção exclusiva de tênis e sneakers da SyntaxWear. Encontre os modelos mais estilosos e confortáveis para elevar seu visual. Compre online agora e transforme cada passo em presença!" />
  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/variables.css" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/components/header.css" />
  <link rel="stylesheet" href="./css/components/hero.css" />
  <link rel="stylesheet" href="./css/components/product-category.css" />
  <!-- Link para CSS pode ser adicionado aqui -->
</head>

<body>
  <header class="header">
    <!-- Logo e navegação -->
    <h1 class="logo">
      <a href="/" title="SyntaxWear - Tênis e Sneakers Online">
        <img src="./images/logo/logo.svg" alt="SyntaxWear - Tênis e Sneakers Online" />
      </a>
    </h1>

    <nav class="nav-center" aria-label="categorias Principais">
      <ul>
        <li><a href="#">Masculino</a></li>
        <li><a href="#">Feminino</a></li>
        <li><a href="#">Outlet</a></li>
      </ul>

    </nav>
    <nav class="nav-right" aria-label="Acesso Rápido">
      <ul>
        <li><a href="#lojas">Nossas lojas</a></li>
        <li><a href="#sobre">Sobre</a></li>
        <li><a href="#perfil" title="Perfil"><img src="./images/icons/user.svg" alt="Perfil"></a></li>
        <li><a href="#ajuda" title="Ajuda"><img src="./images/icons/help.svg" alt="Ajuda"></a></li>
        <li><a href="#carrinho" title="Carrinho"><img src="./images/icons/bag.svg" alt="Carrinho"></a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="hero" class="hero-section">
      <!-- Seção hero -->
      <div class="hero-overlay">
        <div class="hero-content">
          <span class="hero-subtitle">Krypton One</span>
          <h2 class="hero-title">Transforme qualquer passo em presença.</h2>
          <div class="hero-buttons">
            <a class="btn btn-outline" href="#">Ver modelos</a>
            <a class="btn btn-filled" href="#">Comprar</a>
          </div>
        </div>
      </div>
      <!-- <h1>Título da Seção</h1> -->
    </section>

    <section class="categories-section">
      <!-- Seção de categorias de tênis -->
      <div class="category-card casual">
        <a href="#" class="category-link">
          <span class="overlay"></span>
          <span class="category-name btn btn-outline">Casual</span>
        </a>
      </div>
      <div class="category-card esporte">
        <a href="#" class="category-link">
          <span class="overlay"></span>
          <span class="category-name btn btn-outline">Esporte</span>
        </a>
      </div>
      <div class="category-card moderno">
        <a href="#" class="category-link">
          <span class="overlay"></span>
          <span class="category-name btn btn-outline">Moderno</span>
        </a>
      </div>
      <div class="category-card futurista">
        <a href="#" class="category-link">
          <span class="overlay"></span>
          <span class="category-name btn btn-outline">Futurista</span>
        </a>
      </div>
    </section>

    <section id="produtos-destaque" class="featured-products-grid">
      <!-- Grid com produtos em destaque -->
    </section>
  </main>

  <footer class="site-footer">
    <!-- Informações de contato e links -->
  </footer>
</body>

</html>
